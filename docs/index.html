<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oref Alerts Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">GitHub Pages</p>
        <h1>Oref Alerts Viewer</h1>
        <p class="subtitle">Browse the repository snapshot by city and date range. Data is refreshed hourly by GitHub Actions.</p>
      </section>

      <section class="panel status-panel">
        <div>
          <p class="label">Generated</p>
          <p id="generatedAt" class="value">Loading...</p>
        </div>
        <div>
          <p class="label">Alerts</p>
          <p id="totalAlerts" class="value">-</p>
        </div>
        <div>
          <p class="label">Cities</p>
          <p id="totalCities" class="value">-</p>
        </div>
        <div>
          <p class="label">Live Oref</p>
          <p id="orefStatus" class="value">-</p>
        </div>
      </section>

      <section class="panel filters">
        <label>
          <span>City</span>
          <input id="cityInput" list="cityOptions" placeholder="Type a city name">
          <datalist id="cityOptions"></datalist>
        </label>
        <label>
          <span>From</span>
          <input id="fromInput" type="datetime-local">
        </label>
        <label>
          <span>To</span>
          <input id="toInput" type="datetime-local">
        </label>
        <div class="actions">
          <button id="applyButton" type="button">Apply Filters</button>
          <button id="resetButton" type="button" class="ghost">Reset</button>
        </div>
      </section>

      <section class="panel">
        <div class="results-head">
          <div>
            <p class="label">Matching alerts</p>
            <p id="resultCount" class="value">-</p>
          </div>
          <div id="activeFilters" class="active-filters"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>City</th>
                <th>Category</th>
                <th>Origin</th>
                <th>Source</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr>
                <td colspan="5">Loading data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
  </html>
